<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ntfy - Sign In</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 40px;
            width: 100%;
            max-width: 380px;
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo svg {
            width: 48px;
            height: 48px;
        }
        .logo h1 {
            font-size: 22px;
            font-weight: 600;
            margin-top: 8px;
            color: #1a1a1a;
        }
        .error {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
        .error.visible { display: block; }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #555;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 16px;
        }
        input:focus {
            border-color: #57b5e7;
            box-shadow: 0 0 0 3px rgba(87,181,231,0.15);
        }
        button {
            width: 100%;
            padding: 11px;
            background: #57b5e7;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #3a9fd5; }
        button:active { background: #2d8abf; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <svg viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
                <circle cx="75" cy="75" r="70" fill="#57b5e7"/>
                <path d="M45 95 L75 45 L105 95 Z" fill="#fff" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>
            </svg>
            <h1>ntfy</h1>
        </div>
        <div class="error" id="error">Invalid username or password. Please try again.</div>
        <form method="POST" action="/login">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autocomplete="username" required autofocus>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>
            <button type="submit">Sign In</button>
        </form>
    </div>
    <script>
        if (window.location.search.indexOf('error=1') !== -1) {
            document.getElementById('error').classList.add('visible');
        }
    </script>
</body>
</html>
