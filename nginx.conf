load_module modules/ngx_http_js_module.so;

worker_processes auto;
pid /run/nginx/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 256;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout combined;

    js_import auth from /etc/nginx/nginx-auth.js;
    js_set $final_auth auth.getAuthHeader;

    # Honor X-Forwarded-Proto from upstream reverse proxy (Caddy/CF),
    # fall back to $scheme for direct/plain-HTTP access.
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }

    # Required for ngx.fetch in njs
    resolver 127.0.0.11 valid=10s ipv6=off;
    js_fetch_verify off;

    upstream ntfy {
        server 127.0.0.1:8080;
    }

    server {
        listen 80;
        server_name _;
        client_max_body_size 15M;

        # --- Login / Logout ---

        location = /login {
            # POST: validate credentials via njs
            limit_except GET HEAD {
                js_content auth.loginPost;
            }
            # GET: serve static login page
            root /usr/share/nginx/html;
            try_files /login.html =404;
        }

        location = /logout {
            js_content auth.logout;
        }

        # --- Internal auth check (used by auth_request) ---

        location = /internal/auth-check {
            internal;
            js_content auth.checkCookie;
        }

        # --- Web UI paths: require cookie auth ---

        location = / {
            auth_request /internal/auth-check;
            error_page 401 = @login_redirect;
            proxy_set_header Authorization $final_auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_pass http://ntfy;
        }

        location /static/ {
            auth_request /internal/auth-check;
            error_page 401 = @login_redirect;
            proxy_set_header Authorization $final_auth;
            proxy_set_header Host $host;
            proxy_pass http://ntfy;
        }

        location = /config.js {
            auth_request /internal/auth-check;
            error_page 401 = @login_redirect;
            proxy_set_header Authorization $final_auth;
            proxy_set_header Host $host;
            proxy_pass http://ntfy;
        }

        location = /sw.js {
            auth_request /internal/auth-check;
            error_page 401 = @login_redirect;
            proxy_set_header Authorization $final_auth;
            proxy_set_header Host $host;
            proxy_pass http://ntfy;
        }

        location = /manifest.json {
            auth_request /internal/auth-check;
            error_page 401 = @login_redirect;
            proxy_set_header Authorization $final_auth;
            proxy_set_header Host $host;
            proxy_pass http://ntfy;
        }

        # --- Redirect to login page ---

        location @login_redirect {
            return 302 $forwarded_proto://$http_host/login;
        }

        # --- API paths: passthrough (ntfy handles auth) ---
        # Inject cookie-based auth if present, but no login redirect.
        # Mobile app / API clients send their own Authorization header.

        location /v1/ {
            proxy_set_header Authorization $final_auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://ntfy;
        }

        # --- Default: all other paths (topic subscriptions, publishing) ---
        # Handles /{topic}/json, /{topic}/ws, /{topic}/sse, POST /{topic}

        location / {
            proxy_set_header Authorization $final_auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Streaming / long-poll support
            proxy_buffering off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            proxy_pass http://ntfy;
        }
    }
}
